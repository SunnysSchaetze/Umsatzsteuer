<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umsatzsteuer</title>
  <style>
    body {
      background-color: black;
      color: #ff7f00;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      width: 100%;
      max-width: 1200px;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    h2 {
      color: #ff7f00;
      font-size: 1.8em;
      margin-top: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .leitfaden-box {
      background-color: #1a1a1a;
      border: 2px solid #ff7f00;
      border-radius: 10px;
      padding: 20px;
      margin: 15px 0;
      transition: transform 0.2s;
      text-align: left;
      color: #ff7f00;
    }

    .leitfaden-box:hover {
      transform: scale(1.02);
    }

    @media (max-width: 600px) {
      h2 {
        font-size: 1.5em;
        white-space: normal;
      }
      .container {
        padding: 10px;
        width: 100%;
        max-width: 100%;
      }
      .leitfaden-box {
        padding: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h2>⚖️ Umsatzsteuer ⚖️</h2>
    <div class="leitfaden-box">
      <p>
        Wird aufgrund der Kleinunternehmerregelung (§19 UStG) bzw. Differenzbesteuerung (§25a UStG) nicht ausgewiesen.
      </p>
    </div>

  </div>

</body>
</html>
