<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umsatzsteuer</title>
  <style>
    body {
      background-color: black;
      color: #ff7f00;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      width: 90%;
      max-width: 1200px;
      padding: 2vw;
      box-sizing: border-box;
      text-align: center;
    }

    h2 {
      color: #ff7f00;
      font-size: clamp(1.2rem, 3vw, 2rem);
      margin-top: 0;
      word-wrap: break-word;
    }

    .leitfaden-box {
      background-color: #1a1a1a;
      border: 2px solid #ff7f00;
      border-radius: 10px;
      padding: clamp(10px, 1.5vw, 20px);
      margin: 2vw 0;
      transition: transform 0.2s;
      text-align: center;
      color: #ff7f00;
      width: 100%;
      max-width: 800px;
      box-sizing: border-box;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
    }

    .leitfaden-box:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>⚖️ Umsatzsteuer ⚖️</h2>
    <div class="leitfaden-box">
      <p>
        Wird aufgrund der Kleinunternehmerregelung (§19 UStG) bzw. Differenzbesteuerung (§25a UStG) nicht ausgewiesen.
      </p>
    </div>
  </div>
</body>
</html>
